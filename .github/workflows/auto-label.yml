name: Auto Label GSSoC

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

# We need write permissions to add labels to issues and PRs
permissions:
  issues: write
  pull-requests: write

jobs:
  apply-label:
    name: Apply gssoc-26 label
    runs-on: ubuntu-latest
    steps:
      - name: Add label
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            core.info(`Event triggered: ${eventName}`);

            if (eventName === 'issues') {
              const currentIssue = context.payload.issue;
              const currentTitle = currentIssue.title.trim().toLowerCase();
              const currentNumber = currentIssue.number;

              core.info(
                `Checking for duplicates for: "${currentIssue.title}" ` +
                `(Issue #${currentNumber})`
              );

              let duplicate = null;

              // 1. Fetch the most recent 100 issues from the repo
              // (avoids search API indexing delay for recent duplicates)
              try {
                const response = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'all',
                  per_page: 100
                });

                duplicate = response.data.find(issue => 
                  issue.number !== currentNumber && 
                  !issue.pull_request &&
                  issue.title.trim().toLowerCase() === currentTitle
                );
              } catch (error) {
                core.error(`Error listing repository issues: ${error.message}`);
              }

              // 2. Try searching via Search API with pagination support if not in recent 100
              if (!duplicate) {
                try {
                  const escapedTitle = currentTitle.replace(/"/g, '\\"');
                  const query = `repo:${context.repo.owner}/${context.repo.repo} ` +
                    `is:issue "${escapedTitle}"`;
                  
                  // Using github.paginate to scan all search results safely
                  const searchItems = await github.paginate(
                    github.rest.search.issuesAndPullRequests,
                    {
                      q: query,
                      per_page: 100
                    }
                  );
                  
                  duplicate = searchItems.find(issue =>
                    issue.number !== currentNumber &&
                    issue.title.trim().toLowerCase() === currentTitle
                  );
                } catch (error) {
                  core.error(`Error searching issues: ${error.message}`);
                }
              }

              if (duplicate) {
                core.info(`Duplicate found: Issue #${duplicate.number}`);
                
                // 1. Comment on the issue
                const commentBody = `👋 Hi @${currentIssue.user.login},\n\n` +
                  `This issue has been identified as a duplicate of #${duplicate.number}. ` +
                  `Duplicate issues are not allowed in this repository.\n\n` +
                  `This issue is being automatically closed and marked with the **gssoc:spam** label. ` +
                  `Please search existing issues before creating new ones. Thank you! 🚀`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: currentNumber,
                  body: commentBody
                });

                // 2. Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: currentNumber,
                  state: 'closed',
                  state_reason: 'not_planned'
                });

                // 3. Remove all existing labels
                try {
                  await github.rest.issues.removeAllLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: currentNumber
                  });
                } catch (error) {
                  core.info(
                    `No labels to remove or error removing labels: ${error.message}`
                  );
                }

                // 4. Check if the 'gssoc:spam' label already exists
                let labelExists = false;
                try {
                  const labelRes = await github.rest.issues.getLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: 'gssoc:spam'
                  });
                  if (labelRes.status === 200) {
                    labelExists = true;
                  }
                } catch (error) {
                  // Octokit throws on 404, which is expected if the label is not present
                  if (error.status !== 404) {
                    core.warning(`Unexpected error checking label: ${error.message}`);
                  }
                }

                // 5. Create the 'gssoc:spam' label if it does not exist
                if (!labelExists) {
                  try {
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: 'gssoc:spam',
                      color: 'e11d48',
                      description: 'Spam or duplicate issue'
                    });
                  } catch (createError) {
                    core.error(`Failed to create label: ${createError.message}`);
                  }
                }

                // 6. Add 'gssoc:spam' label only
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: currentNumber,
                  labels: ['gssoc:spam']
                });

              } else {
                // Not a duplicate - apply default labels
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: currentNumber,
                  labels: ['gssoc-26', 'mentor:arpittkhandelwal']
                });
              }
            } else {
              // Apply labels to PR/other events
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['gssoc-26', 'mentor:arpittkhandelwal']
              });
            }
